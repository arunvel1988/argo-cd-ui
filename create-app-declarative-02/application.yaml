apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/arunvel1988/argocd-example-apps"
    targetRevision: HEAD
    path: guestbook   # <-- IMPORTANT
  destination:
    server: "https://kubernetes.default.svc"
    namespace: guestbook
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
